<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Maskable safe zone: 40px padding (192*0.2 = ~38px) -->
  <rect width="192" height="192" rx="40" fill="#0F1729"/>
  <!-- Arc background -->
  <circle cx="96" cy="96" r="58" fill="none" stroke="#1E2D4A" stroke-width="12"/>
  <!-- Emerald arc (partial) -->
  <circle cx="96" cy="96" r="58" fill="none" stroke="#00C48C" stroke-width="12"
    stroke-dasharray="219 146" stroke-dashoffset="73" stroke-linecap="round"
    transform="rotate(-90 96 96)"/>
  <!-- Center "B" letter -->
  <text x="96" y="108" text-anchor="middle" font-family="system-ui,sans-serif"
    font-weight="700" font-size="44" fill="#F0EDE6">₿</text>
</svg>
